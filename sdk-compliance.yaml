  # ── Functions ──────────────────────────────────────────────────────────────

  functions.invocation.invoke:
    status: implemented
    note: "Three return shapes — string, deserialized T, and raw HttpContent."
    symbols:
      - Client.Invoke
      - Client.RawInvoke
  functions.invocation.set_auth_token:
    status: partially_implemented
    note: "No stateful SetAuth; bearer token is supplied per invocation or via a GetHeaders provider hook, not stored for all subsequent calls."
    symbols:
      - Client.GetHeaders
  functions.invocation.method_override:
    status: implemented
    note: "InvokeFunctionOptions.HttpMethod is wired into the request (default POST). [feature-parity.md called this POST-only; the source disagrees as of 2026-06-29.]"
    symbols:
      - InvokeFunctionOptions.HttpMethod
  functions.invocation.streaming_response:
    status: partially_implemented
    note: "RawInvoke returns raw HttpContent, but the request uses the default buffered completion (no incremental text/event-stream streaming)."
    symbols:
      - Client.RawInvoke
  functions.invocation.region_selection:
